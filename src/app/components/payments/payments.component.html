<div class="row g-4">
    <div class="col-lg-5">
        <div class="card p-3 p-md-4">
            <h5 class="mb-3">
                <i class="bi bi-cloud-upload text-brand me-2"></i>Record a payment
            </h5>
            <p class="text-muted small">
                Capture the details of a contribution and attach your proof of payment.
            </p>

            <!-- @if (success()) {
            <div class="alert alert-success py-2">{{ success() }}</div>
            }
            @if (error()) {
            <div class="alert alert-danger py-2">{{ error() }}</div>
            } -->

            <form  > <!-- (ngSubmit)="submit()" #f="ngForm" -->
                <div class="mb-3">
                    <label class="form-label">Amount (R)</label>
                    <input type="number" step="0.01" min="0.01" class="form-control" name="amount" 
                        required /> <!-- [(ngModel)]="amount"-->
                </div>
                <div class="mb-3">
                    <label class="form-label">Payment method</label>
                    <select class="form-select" name="method" > <!-- [(ngModel)]="method"-->
                        <option value="eft">EFT / Bank transfer</option>
                        <option value="cash">Cash</option>
                        <option value="transfer">Instant transfer</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Reference</label>
                    <input type="text" class="form-control" name="reference" 
                        placeholder="e.g. May-2026" /> <!-- [(ngModel)]="reference"-->
                </div>
                <div class="mb-3">
                    <label class="form-label">Payment date</label>
                    <input type="date" class="form-control" name="paidAt" /> <!-- [(ngModel)]="paidAt"-->
                </div>
                <div class="mb-3">
                    <label class="form-label">Proof of payment</label>
                    <input type="file" class="form-control" 
                        accept="image/*,application/pdf" /> <!-- (change)="onFile($event)"-->
                    <div class="form-text">Max 5MB — PDF or image.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Note <span class="text-muted">(optional)</span></label>
                    <textarea class="form-control" rows="2" name="note" ></textarea> <!-- [(ngModel)]="note"-->
                </div>
                <!-- <button type="submit" class="btn btn-primary w-100" [disabled]="loading() || f.invalid">
                    @if (loading()) {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    }
                    Submit payment
                </button> -->
            </form>
        </div>
    </div>

    <div class="col-lg-7">
        <div class="card p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Payment history</h5>
                <button class="btn btn-sm btn-outline-primary" > <!-- (click)="refresh()" [disabled]="listLoading()"-->
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
